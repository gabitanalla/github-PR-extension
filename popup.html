<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PR's Review viewer</title>
    <style>
      @import url("popup.css");
    </style>
  </head>
  <body>
    <h1>PR's Review viewer</h1>
    <div id="userContainer">
      <p id="userStatus">Loading...</p>
      <div id="reposContainer" style="display: none">
        <label
          for="repoSelect"
          style="color: white; display: block; margin-top: 10px"
        >
          <strong>Repos:</strong>
        </label>
        <select id="repoSelect">
          <option value="">Select a repo...</option>
        </select>
        <div id="prBadge" class="pr-badge"></div>
        <div id="prContainer">
          <h3>PRs pending of revision:</h3>
          <div id="prStatus"></div>
          <div id="prList"></div>
        </div>
      </div>
      <div id="tokenContainer">
        <label for="tokenInput">
          <strong>Personal Token (PAT):</strong>
        </label>
        <input
          id="tokenInput"
          type="password"
          placeholder="Enter your GitHub Personal Access Token"
        />
        <button id="saveTokenBtn">Save Token</button>
        <button id="clearTokenBtn" class="danger" style="display: none">
          Clear Token
        </button>
        <div id="tokenStatus" class="token-status"></div>
      </div>
    </div>
    <script src="constants.js"></script>
    <script src="messages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
